version: '3.8'

services:
  otaku-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otaku-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=https://otakudesu.best
      - CACHE_TTL_LATEST=300
      - CACHE_TTL_ANIME=600
      - CACHE_TTL_SEARCH=180
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=60
      - REQUEST_DELAY_MIN=1000
      - REQUEST_DELAY_MAX=3000
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_TIMEOUT=30000
    volumes:
      # Mount untuk development (opsional)
      # - ./:/app
      # - /app/node_modules
      # Cache volume (opsional)
      - cache_data:/app/.cache
    networks:
      - otaku-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  otaku-network:
    driver: bridge

# Volumes
volumes:
  cache_data:
    driver: local
